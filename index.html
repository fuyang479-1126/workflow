<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队工作流控制台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink: #1c1a17;
  --ink2: #4a4740;
  --ink3: #8a8780;
  --paper: #f7f5f0;
  --surface: #efede7;
  --surface2: #e5e2da;
  --line: #dbd8d0;
  --line2: #ccc9c0;
  --gold: #b8860b;
  --gold-l: #fdf6e3;
  --gold-m: #e8c96a;
  --red: #c0392b;
  --red-l: #fdf0ee;
  --teal: #1a7a6e;
  --teal-l: #e8f5f3;
  --slate: #2c3e50;
  --slate-l: #eef1f4;
  --r: 8px;
  --r2: 14px;
  --r3: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ── LOADING ── */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  z-index: 9999;
  transition: opacity 0.5s;
}
#loading-screen.fade { opacity: 0; pointer-events: none; }
.load-logo {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 600;
  color: var(--gold-m);
  letter-spacing: 0.1em;
}
.load-bar {
  width: 160px; height: 2px;
  background: rgba(255,255,255,.1);
  border-radius: 2px; overflow: hidden;
}
.load-fill {
  height: 100%; background: var(--gold-m);
  border-radius: 2px;
  animation: loadfill 1.2s ease forwards;
}
@keyframes loadfill { from { width: 0 } to { width: 100% } }
.load-sub { font-size: 12px; color: rgba(255,255,255,.3); font-family: 'DM Mono', monospace; }

/* ── HEADER ── */
.header {
  background: var(--ink);
  height: 56px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.header-brand {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; font-weight: 600;
  color: var(--gold-m);
  letter-spacing: 0.06em;
  flex: 1;
  display: flex; align-items: center; gap: 10px;
}
.header-brand::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px rgba(26,122,110,.6);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
.sync-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: rgba(255,255,255,.3);
  letter-spacing: .04em;
}
.user-pill {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 100px;
  padding: 5px 12px 5px 6px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.user-pill:hover { background: rgba(255,255,255,.12); }
.uav {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
.uname { font-size: 13px; color: rgba(255,255,255,.8); font-weight: 500; }
.urole {
  font-size: 9px; font-family: 'DM Mono', monospace;
  letter-spacing: .05em;
  padding: 2px 7px; border-radius: 100px;
  background: rgba(184,134,11,.2); color: var(--gold-m);
}
.urole.member { background: rgba(255,255,255,.08); color: rgba(255,255,255,.4); }

.user-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: #1c1a17;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r2);
  overflow: hidden; min-width: 160px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  display: none; z-index: 200;
}
.user-dropdown.open { display: block; }
.udopt {
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: rgba(255,255,255,.65);
  cursor: pointer; transition: background .12s;
}
.udopt:hover { background: rgba(255,255,255,.07); color: #fff; }
.udopt.active { background: rgba(184,134,11,.15); color: var(--gold-m); }
.udopt-av {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: #fff;
}

/* ── TABS ── */
.tabs {
  background: #fff;
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex; gap: 0;
}
.tab {
  padding: 14px 16px;
  font-size: 13px; font-weight: 500;
  color: var(--ink3);
  border: none; background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s;
  white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.tab:hover { color: var(--ink2); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── BODY ── */
.body { padding: 24px; }
.section { display: none; }
.section.active { display: block; }

/* ── BOARD ── */
.board-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.col-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.col-stripe { width: 3px; height: 16px; border-radius: 2px; flex-shrink: 0; }
.s-todo { background: var(--line2); }
.s-doing { background: var(--gold); }
.s-review { background: var(--red); }
.s-done { background: var(--teal); }
.col-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--ink3);
}
.col-cnt {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--ink3);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 100px; padding: 1px 8px;
}
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r2);
  padding: 13px 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow .2s, transform .15s;
  position: relative; overflow: hidden;
  animation: cardIn .25s ease backwards;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(6px); } }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-1px); }
.card.global-card { border-left: 3px solid var(--gold); }
.card-title {
  font-size: 13px; font-weight: 500;
  color: var(--ink); line-height: 1.45;
  margin-bottom: 8px;
}
.card-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.chip {
  font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 100px;
  white-space: nowrap;
}
.ch-high { background: var(--red-l); color: var(--red); }
.ch-mid { background: var(--gold-l); color: #7a5c00; }
.ch-low { background: var(--teal-l); color: var(--teal); }
.ch-cat { background: var(--slate-l); color: var(--slate); }
.ch-global { background: var(--gold-l); color: var(--gold); border: 1px solid rgba(184,134,11,.25); }
.card-foot {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--ink3);
}
.av {
  width: 18px; height: 18px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
.prog-thin { margin-top: 9px; }
.prog-track {
  height: 3px; background: var(--surface2);
  border-radius: 2px; overflow: hidden;
}
.prog-bar {
  height: 100%; border-radius: 2px;
  background: var(--gold);
  transition: width .4s ease;
}
.prog-bar.done { background: var(--teal); }
.add-col-btn {
  width: 100%; padding: 9px;
  border: 1.5px dashed var(--line2);
  border-radius: var(--r2);
  background: none; color: var(--ink3);
  font-size: 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
}
.add-col-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-l); }

/* ── PUBLISH FORM ── */
.form-wrap { max-width: 600px; }
.form-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r2);
  padding: 28px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.form-head { margin-bottom: 22px; }
.form-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px; font-weight: 500; color: var(--ink);
}
.form-sub { font-size: 13px; color: var(--ink3); margin-top: 4px; }
.frow { margin-bottom: 16px; }
.flabel {
  font-size: 11px; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--ink3); display: block; margin-bottom: 6px;
}
.finput, .fselect, .ftextarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: var(--paper);
  color: var(--ink);
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  transition: border-color .15s, background .15s;
}
.finput:focus, .fselect:focus, .ftextarea:focus {
  outline: none;
  border-color: var(--gold);
  background: #fff;
}
.ftextarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.lock-notice {
  background: var(--red-l);
  border: 1px solid rgba(192,57,43,.2);
  border-radius: var(--r);
  padding: 12px 14px;
  font-size: 13px; color: var(--red);
  margin-bottom: 16px; display: none;
}
.toast {
  border-radius: var(--r); padding: 10px 14px;
  font-size: 12px; margin-top: 12px; display: none;
}
.toast.ok { background: var(--teal-l); color: var(--teal); border: 1px solid rgba(26,122,110,.2); }
.toast.err { background: var(--red-l); color: var(--red); border: 1px solid rgba(192,57,43,.2); }
.toggle-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--surface); border-radius: var(--r);
  cursor: pointer; transition: background .15s;
}
.toggle-row:hover { background: var(--surface2); }
.tgl {
  width: 36px; height: 20px; border-radius: 10px;
  background: var(--line2); position: relative;
  transition: background .2s; flex-shrink: 0;
}
.tgl.on { background: var(--gold); }
.tgl::after {
  content: ''; position: absolute;
  width: 14px; height: 14px; background: #fff;
  border-radius: 50%; top: 3px; left: 3px;
  transition: left .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.tgl.on::after { left: 19px; }
.tgl-label { font-size: 13px; font-weight: 500; color: var(--ink); }
.tgl-sub { font-size: 11px; color: var(--ink3); }

/* ── BUTTONS ── */
.btn {
  padding: 10px 22px; border: none;
  border-radius: var(--r);
  font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all .15s;
  display: inline-flex; align-items: center; gap: 7px;
}
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--ink2); }
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: #9a7008; }
.btn-teal { background: var(--teal); color: #fff; }
.btn-teal:hover { opacity: .88; }
.btn-outline {
  background: #fff; color: var(--ink);
  border: 1px solid var(--line);
}
.btn-outline:hover { border-color: var(--ink2); }
.btn-danger { background: var(--red-l); color: var(--red); border: 1px solid rgba(192,57,43,.2); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

/* ── MINE ── */
.mine-section { margin-bottom: 26px; }
.mine-head {
  font-size: 11px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.mine-head::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.mine-row {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r2);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 9px;
  transition: box-shadow .2s;
  animation: cardIn .2s ease backwards;
}
.mine-row:hover { box-shadow: 0 2px 10px rgba(0,0,0,.06); }
.mine-row.global-row { border-left: 3px solid var(--gold); }
.mine-info { flex: 1; min-width: 0; }
.mine-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
.mine-meta { font-size: 11px; color: var(--ink3); line-height: 1.5; }
.mine-prog { margin-top: 7px; }
.btn-group { display: flex; gap: 6px; flex-shrink: 0; }
.empty { font-size: 12px; color: var(--ink3); padding: 8px 0; font-style: italic; }

/* ── OVERVIEW ── */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
.stat {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r2); padding: 18px 20px;
}
.stat-num {
  font-family: 'DM Mono', monospace;
  font-size: 30px; font-weight: 500; color: var(--ink);
  line-height: 1;
}
.stat-num.g { color: var(--gold); }
.stat-num.r { color: var(--red); }
.stat-num.t { color: var(--teal); }
.stat-label {
  font-size: 11px; color: var(--ink3);
  margin-top: 6px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em;
}
.member-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.member-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r2); padding: 18px;
  animation: cardIn .2s ease backwards;
}
.member-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.member-av {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
.member-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.member-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }
.member-prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.member-pct {
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  color: var(--ink2); min-width: 34px; text-align: right;
}
.member-stats { display: flex; gap: 14px; }
.mstat { font-size: 11px; color: var(--ink3); }
.mstat span { color: var(--ink2); font-weight: 500; }
.blocker-badge {
  font-size: 10px; background: var(--red-l);
  color: var(--red); border-radius: 100px;
  padding: 3px 9px; margin-top: 8px; display: inline-block;
}

/* ── PROGRESS MODAL ── */
.stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-bottom: 16px; }
.stage-btn {
  padding: 11px 8px; border: 1px solid var(--line);
  border-radius: var(--r); background: var(--paper);
  color: var(--ink2); font-size: 12px; cursor: pointer;
  text-align: center; line-height: 1.4;
  transition: all .15s; font-family: 'DM Sans', sans-serif;
}
.stage-btn:hover { border-color: var(--gold); color: var(--gold); }
.stage-btn.sel {
  border-color: var(--gold); background: var(--gold-l);
  color: #7a5c00; font-weight: 600;
}
.stage-big { font-size: 14px; font-weight: 600; display: block; margin-bottom: 3px; }
.stage-hint { font-size: 10px; opacity: .7; }
.prog-preview { margin: 10px 0 4px; }
.prog-preview-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.prog-preview-fill {
  height: 100%; background: var(--gold);
  border-radius: 3px; transition: width .35s ease;
}
.prog-preview-fill.full { background: var(--teal); }
.prog-preview-labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--ink3);
  font-family: 'DM Mono', monospace; margin-top: 4px;
}

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(28,26,23,.5);
  z-index: 100; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: #fff; border-radius: var(--r2);
  padding: 26px; width: 480px; max-width: 100%;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(.97) translateY(8px); } }
.modal-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px; font-weight: 500; color: var(--ink);
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.modal-foot {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 20px; padding-top: 14px;
  border-top: 1px solid var(--line);
}

.divider { height: 1px; background: var(--line); margin: 20px 0; }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--line2); border-top-color: var(--ink3);
  border-radius: 50%; animation: spin .7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading { font-size: 12px; color: var(--ink3); padding: 12px 0; font-style: italic; }

.update-box {
  margin-top: 14px; padding: 13px 14px;
  background: var(--surface); border-radius: var(--r);
  font-size: 12px; color: var(--ink2); line-height: 1.7;
  border-left: 2px solid var(--gold-m);
}
</style>
</head>
<body>

<!-- 加载屏 -->
<div id="loading-screen">
  <div class="load-logo">团队工作流控制台</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-sub">正在连接数据库…</div>
</div>

<!-- 顶栏 -->
<div class="header">
  <div class="header-brand">团队工作流控制台</div>
  <div class="sync-label" id="sync-label">● 已连接</div>
  <div style="position:relative" id="user-pill-wrap">
    <div class="user-pill" onclick="toggleUserMenu()">
      <div class="uav" id="hd-av" style="background:#b8860b">符</div>
      <div class="uname" id="hd-name">老符</div>
      <div class="urole" id="hd-role">发布者</div>
    </div>
    <div class="user-dropdown" id="user-menu"></div>
  </div>
</div>

<!-- 标签栏 -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('board')">任务看板</button>
  <button class="tab" onclick="switchTab('publish')">发布任务</button>
  <button class="tab" onclick="switchTab('mine')">我的任务</button>
  <button class="tab" onclick="switchTab('overview')">团队总览</button>
</div>

<!-- 主体 -->
<div class="body">

  <!-- 看板 -->
  <div id="board" class="section active">
    <div class="board-grid">
      <div>
        <div class="col-head"><div class="col-stripe s-todo"></div><span class="col-label">待认领</span><span class="col-cnt" id="cnt-todo">…</span></div>
        <div id="col-todo"><div class="loading"><span class="spinner"></span>加载中…</div></div>
        <button class="add-col-btn" id="board-add" onclick="switchTab('publish')">+ 发布新任务</button>
      </div>
      <div>
        <div class="col-head"><div class="col-stripe s-doing"></div><span class="col-label">进行中</span><span class="col-cnt" id="cnt-doing">…</span></div>
        <div id="col-doing"></div>
      </div>
      <div>
        <div class="col-head"><div class="col-stripe s-review"></div><span class="col-label">待确认</span><span class="col-cnt" id="cnt-review">…</span></div>
        <div id="col-review"></div>
      </div>
      <div>
        <div class="col-head"><div class="col-stripe s-done"></div><span class="col-label">已完成</span><span class="col-cnt" id="cnt-done">…</span></div>
        <div id="col-done"></div>
      </div>
    </div>
  </div>

  <!-- 发布任务 -->
  <div id="publish" class="section">
    <div class="form-wrap">
      <div class="lock-notice" id="pub-lock">只有老符可以发布任务，请切换到老符账号。</div>
      <div class="form-card" id="pub-form">
        <div class="form-head">
          <div class="form-title">发布新任务</div>
          <div class="form-sub">填写任务信息，团队成员可领取并跟进</div>
        </div>

<script>
// ── Supabase 配置 ──
const SUPABASE_URL = 'https://lbunazuqugkdehugyqup.supabase.co';
const SUPABASE_KEY = 'sb_publishable_9z00QeuzozazhjQ0xQsPQg_dIVEVWoC';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const MEMBERS = ['周大师','张总','郭美','田帅','小李子'];
const ALL = ['老符',...MEMBERS];
const AV_COLORS = ['#b8860b','#1a7a6e','#2c3e50','#c0392b','#7d5a9a','#1a6e9a'];
const PRI_TAG = { high:'ch-high', mid:'ch-mid', low:'ch-low' };
const PRI_L = { high:'高', mid:'中', low:'低' };
let cu = '老符', tasks = [], isGlobal = false, progTaskId = null, selPct = 0, isBlocked = false;

function avColor(n) { return AV_COLORS[ALL.indexOf(n) % AV_COLORS.length]; }

// ── 初始化 ──
async function init() {
  try {
    // 确保表存在
    await ensureTable();
    await loadTasks();
    // 实时订阅
    db.channel('tasks-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => { loadTasks(); })
      .subscribe();
    document.getElementById('sync-label').textContent = '● 实时同步';
  } catch(e) {
    document.getElementById('sync-label').textContent = '⚠ 连接失败';
    document.getElementById('sync-label').style.color = '#c0392b';
    // 使用本地数据作为后备
    tasks = getDefaultTasks();
    renderAll();
  }
  setTimeout(() => {
    const ls = document.getElementById('loading-screen');
    ls.classList.add('fade');
    setTimeout(() => ls.remove(), 500);
  }, 1400);
}

async function ensureTable() {
  // 尝试查询，如果失败则创建表
  const { error } = await db.from('tasks').select('id').limit(1);
  if (error && error.code === '42P01') {
    // 表不存在，通过RPC创建（需要在Supabase SQL编辑器中手动创建）
    console.log('需要创建表');
  }
}

async function loadTasks() {
  const { data, error } = await db.from('tasks').select('*').order('ts', { ascending: true });
  if (error) {
    if (tasks.length === 0) { tasks = getDefaultTasks(); await seedTasks(); }
    return;
  }
  if (data.length === 0 && tasks.length === 0) {
    tasks = getDefaultTasks();
    await seedTasks();
    return;
  }
  if (data.length > 0) {
    tasks = data.map(r => ({ ...r, claims: r.claims || [], updates: r.updates || [] }));
  }
  renderAll();
}

async function seedTasks() {
  for (const t of tasks) {
    await db.from('tasks').upsert(t);
  }
  renderAll();
}

async function saveTask(t) {
  const { error } = await db.from('tasks').upsert(t);
  if (error) console.error('保存失败', error);
}

function getDefaultTasks() {
  return [
    {id:'d1',title:'官网首页重设计',description:'根据新品牌规范，更新首页视觉风格，包括Banner、导航和底部区域。',pri:'high',due:'2026-04-28',cat:'设计',status:'todo',assignee:null,is_global:false,progress:0,claims:[],updates:[],ts:1},
    {id:'d2',title:'支付SDK接入方案',description:'制定微信支付和支付宝接入技术方案，评估工作量。',pri:'high',due:'2026-05-05',cat:'分解方案',status:'todo',assignee:null,is_global:false,progress:0,claims:[],updates:[],ts:2},
    {id:'d3',title:'本月运营周报',description:'汇总各渠道数据，撰写分析报告提交管理层。',pri:'mid',due:'2026-04-25',cat:'其他',status:'doing',assignee:'张总',is_global:false,progress:40,claims:['张总'],updates:[{user:'张总',done:'完成了数据收集和初稿框架',next:'周五定稿',eta:'2026-04-25',pct:40,blocked:false}],ts:3},
    {id:'d4',title:'4月产品迭代发布',description:'完成测试后按流程上线，填写发布记录。',pri:'high',due:'2026-04-30',cat:'发布',status:'doing',assignee:'田帅',is_global:false,progress:65,claims:['田帅'],updates:[{user:'田帅',done:'联调完成，回归测试中',next:'本周四上线',eta:'2026-04-30',pct:65,blocked:false}],ts:4},
    {id:'d5',title:'Q2目标细化拆解',description:'将Q2整体目标拆解为各成员可执行的具体任务，每人提交自己的细化方案。',pri:'high',due:'2026-04-26',cat:'细化方案',status:'todo',assignee:null,is_global:true,progress:0,claims:[],updates:[],ts:5},
    {id:'d6',title:'Q1季度总结',description:'整理Q1成果，提交总结文档。',pri:'low',due:'2026-04-15',cat:'其他',status:'done',assignee:'郭美',is_global:false,progress:100,claims:['郭美'],updates:[],ts:6},
  ];
}

function renderAll() { renderBoard(); renderMine(); renderOverview(); }

// ── 看板 ──
function renderBoard() {
  const cols = { todo:[], doing:[], review:[], done:[] };
  tasks.forEach(t => cols[t.status] && cols[t.status].push(t));
  ['todo','doing','review','done'].forEach(s => {
    const el = document.getElementById('col-'+s); el.innerHTML = '';
    if (!cols[s].length) { el.innerHTML = '<div class="empty">暂无</div>'; }
    cols[s].forEach((t, i) => {
      const d = document.createElement('div');
      d.className = 'card' + (t.is_global ? ' global-card' : '');
      d.style.animationDelay = (i * 0.05) + 's';
      d.onclick = () => openDetail(t);
      const gl = t.is_global;
      const claimCount = (t.claims||[]).length;
      const who = gl
        ? `<span style="font-size:10px;color:var(--ink3)">${claimCount}/${MEMBERS.length} 人已领</span>`
        : (t.assignee
          ? `<div class="av" style="background:${avColor(t.assignee)}">${t.assignee[0]}</div><span>${t.assignee}</span>`
          : '<span style="color:var(--ink3);font-size:11px">待认领</span>');
      d.innerHTML = `<div class="card-title">${t.title}</div>
        <div class="card-chips">
          ${gl ? '<span class="chip ch-global">全员</span>' : ''}
          <span class="chip ${PRI_TAG[t.pri]}">${PRI_L[t.pri]}优</span>
          <span class="chip ch-cat">${t.cat}</span>
        </div>
        <div class="card-foot">${who}${t.due ? `<span style="margin-left:auto">${t.due}</span>` : ''}</div>
        ${s !== 'todo' ? `<div class="prog-thin"><div class="prog-track"><div class="prog-bar${t.progress>=100?' done':''}" style="width:${t.progress||0}%"></div></div></div>` : ''}`;
      el.appendChild(d);
    });
    document.getElementById('cnt-'+s).textContent = cols[s].length;
  });
}

// ── 我的任务 ──
function renderMine() {
  const isMem = cu !== '老符';
  const avail = tasks.filter(t => {
    if (t.status !== 'todo') return false;
    if (t.is_global) return isMem && !(t.claims||[]).includes(cu);
    if (t.assignee) return t.assignee === cu;
    return isMem;
  });
  const doing = tasks.filter(t => t.status === 'doing' && (t.assignee === cu || (t.is_global && (t.claims||[]).includes(cu))));
  const rev = tasks.filter(t => t.status === 'review' && (cu === '老符' || t.assignee === cu || (t.is_global && (t.claims||[]).includes(cu))));

  const mk = (el, items, mode) => {
    el.innerHTML = items.length ? '' : '<div class="empty">暂无</div>';
    items.forEach((t, i) => {
      const d = document.createElement('div');
      d.className = 'mine-row' + (t.is_global ? ' global-row' : '');
      d.style.animationDelay = (i * 0.05) + 's';
      const lastUp = t.updates && t.updates.length ? t.updates[t.updates.length-1] : null;
      let btns = '';
      if (mode === 'avail') btns = `<button class="btn btn-gold btn-sm" onclick="claim('${t.id}')">领取任务</button>`;
      else if (mode === 'doing') btns = `<div class="btn-group"><button class="btn btn-outline btn-sm" onclick="openProg('${t.id}')">更新进度</button><button class="btn btn-teal btn-sm" onclick="submitReview('${t.id}')">提交完成 →</button></div>`;
      else if (mode === 'rev' && cu === '老符') btns = `<div class="btn-group"><button class="btn btn-danger btn-sm" onclick="reject('${t.id}')">退回</button><button class="btn btn-teal btn-sm" onclick="approve('${t.id}')">确认完成 ✓</button></div>`;
      else btns = `<span style="font-size:11px;color:var(--ink3);font-style:italic">等待老符确认…</span>`;
      d.innerHTML = `<div class="mine-info">
        <div class="mine-title">${t.is_global ? '<span style="color:var(--gold);font-size:11px;font-weight:600;margin-right:5px">[全员]</span>' : ''}${t.title}</div>
        <div class="mine-meta">${t.cat} · ${PRI_L[t.pri]}优先 · ${t.due||'未设截止'}${t.status!=='todo'?' · 进度 '+(t.progress||0)+'%':''}</div>
        ${lastUp && mode==='doing' ? `<div style="font-size:11px;color:var(--ink3);margin-top:4px;font-style:italic">上次：${lastUp.done||''}</div>` : ''}
        ${t.status!=='todo' ? `<div class="mine-prog"><div class="prog-track"><div class="prog-bar${t.progress>=100?' done':''}" style="width:${t.progress||0}%"></div></div></div>` : ''}
      </div>${btns}`;
      el.appendChild(d);
    });
  };
  mk(document.getElementById('avail-list'), avail, 'avail');
  mk(document.getElementById('doing-list'), doing, 'doing');
  mk(document.getElementById('review-list'), rev, 'rev');
  if (cu === '老符') {
    document.getElementById('avail-list').innerHTML = '<div class="empty">老符为发布者，不参与认领</div>';
    document.getElementById('doing-list').innerHTML = '';
    document.getElementById('review-head-lbl').textContent = '待我确认';
  } else {
    document.getElementById('review-head-lbl').textContent = '待老符确认';
  }
}

// ── 总览 ──
function renderOverview() {
  const total = tasks.length, done = tasks.filter(t=>t.status==='done').length;
  const doing = tasks.filter(t=>t.status==='doing').length, rev = tasks.filter(t=>t.status==='review').length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('stat-row').innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">全部任务</div></div>
    <div class="stat"><div class="stat-num g">${doing}</div><div class="stat-label">进行中</div></div>
    <div class="stat"><div class="stat-num r">${rev}</div><div class="stat-label">待确认</div></div>
    <div class="stat"><div class="stat-num t">${pct}%</div><div class="stat-label">整体完成率</div></div>`;
  const mg = document.getElementById('member-grid'); mg.innerHTML = '';
  MEMBERS.forEach((m, mi) => {
    const my = tasks.filter(t => t.assignee===m || (t.is_global&&(t.claims||[]).includes(m)));
    const md = my.filter(t=>t.status==='done').length;
    const mdo = my.filter(t=>t.status==='doing').length;
    const mr = my.filter(t=>t.status==='review').length;
    const mp = my.length ? Math.round(md/my.length*100) : 0;
    const hasBlock = my.some(t => t.updates && t.updates.some(u=>u.blocked));
    const c = document.createElement('div'); c.className = 'member-card';
    c.style.animationDelay = (mi * 0.07) + 's';
    c.innerHTML = `<div class="member-top">
      <div class="member-av" style="background:${avColor(m)}">${m[0]}</div>
      <div><div class="member-name">${m}</div><div class="member-sub">${my.length} 个任务</div></div>
    </div>
    <div class="member-prog-row">
      <div style="flex:1"><div class="prog-track" style="height:5px"><div class="prog-bar${mp>=100?' done':''}" style="width:${mp}%"></div></div></div>
      <div class="member-pct">${mp}%</div>
    </div>
    <div class="member-stats">
      <div class="mstat">进行中 <span>${mdo}</span></div>
      <div class="mstat">审核中 <span>${mr}</span></div>
      <div class="mstat">已完成 <span>${md}</span></div>
    </div>
    ${hasBlock ? '<div class="blocker-badge">⚠ 有任务遇阻</div>' : ''}`;
    mg.appendChild(c);
  });
}

// ── 详情弹窗 ──
function openDetail(t) {
  document.getElementById('modal-title').textContent = t.title;
  const cl = (t.claims||[]).join('、') || '无';
  const lastUp = t.updates && t.updates.length ? t.updates[t.updates.length-1] : null;
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:12px">${t.description}</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${t.is_global ? '<span class="chip ch-global">全员任务</span>' : ''}
      <span class="chip ${PRI_TAG[t.pri]}">${PRI_L[t.pri]}优先</span>
      <span class="chip ch-cat">${t.cat}</span>
      ${t.due ? `<span class="chip" style="background:var(--surface);color:var(--ink2)">截止 ${t.due}</span>` : ''}
    </div>
    ${t.is_global ? `<div style="font-size:12px;color:var(--ink3);margin-bottom:10px">已认领：${cl}</div>` : ''}
    ${t.status!=='todo' ? `<div style="font-size:12px;color:var(--ink3);margin-bottom:4px">完成度 ${t.progress||0}%</div>
    <div class="prog-track" style="height:5px"><div class="prog-bar${t.progress>=100?' done':''}" style="width:${t.progress||0}%"></div></div>` : ''}
    ${lastUp ? `<div class="update-box">
      <strong style="color:var(--ink)">最新进展（${lastUp.user}）</strong><br>
      ${lastUp.done ? `已完成：${lastUp.done}<br>` : ''}
      ${lastUp.next ? `下一步：${lastUp.next}<br>` : ''}
      ${lastUp.eta ? `预计完成：${lastUp.eta}` : ''}
      ${lastUp.blocked ? `<div style="color:var(--red);margin-top:4px">⚠ 遇阻：${lastUp.blocker||''}</div>` : ''}
    </div>` : ''}`;
  const f = document.getElementById('modal-foot');
  f.innerHTML = `<button class="btn btn-outline btn-sm" onclick="closeModal()">关闭</button>`;
  if (t.status === 'review' && cu === '老符') {
    f.innerHTML += `<button class="btn btn-danger btn-sm" onclick="reject('${t.id}');closeModal()">退回</button>
    <button class="btn btn-teal btn-sm" onclick="approve('${t.id}');closeModal()">确认完成 ✓</button>`;
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ── 进度弹窗 ──

    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px;padding:10px 12px;background:var(--surface);border-radius:var(--r);line-height:1.6;border-left:2px solid var(--gold-m)">

    </div>

      <button class="stage-btn" onclick="pickStage(this,100)"><span class="stage-big">完成 ✓</span><span class="stage-hint">可提交审核</span></button>

      <div class="prog-preview-track"><div class="prog-preview-fill" id="pp-fill" style="width:${t.progress||0}%"></div></div>
      <div class="prog-preview-labels"><span id="pp-label">请选择阶段</span><span id="pp-pct">${t.progress||0}%</span></div>
    </div>
    <div style="height:14px"></div>
    <div style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px">本次做了什么</div>
    <textarea class="ftextarea" id="p-done" placeholder="例：完成了三套草案，已和产品确认方向…" style="margin-bottom:12px"></textarea>
    <div style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px">接下来打算做什么</div>
    <textarea class="ftextarea" id="p-next" placeholder="例：明天细化方案，周五提交…" style="min-height:60px;margin-bottom:12px"></textarea>
    <div class="fgrid" style="margin-bottom:14px">
      <div><div style="font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px">预计完成日期</div><input type="date" class="finput" id="p-eta"/></div>

      </div>
      <div id="b-input" style="display:none;margin-top:10px">
        <textarea class="ftextarea" id="p-block" placeholder="描述遇到的问题，需要什么支持…" style="min-height:56px"></textarea>
      </div>
    </div>`;
  document.getElementById('prog-modal').classList.add('open');
}
function closeProg() { document.getElementById('prog-modal').classList.remove('open'); progTaskId = null; }
function pickStage(btn, pct) {
  document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel'); selPct = pct;
  const f = document.getElementById('pp-fill');
  f.style.width = pct + '%';
  f.className = 'prog-preview-fill' + (pct >= 100 ? ' full' : '');
  const labels = {10:'刚开始',30:'初步推进',50:'进行一半',70:'大部分完成',90:'基本完成',100:'完成 ✓'};
  document.getElementById('pp-label').textContent = labels[pct] || '';
  document.getElementById('pp-pct').textContent = pct + '%';
}
function toggleBlock2() {
  isBlocked = !isBlocked;
  document.getElementById('b-tgl').className = 'tgl' + (isBlocked ? ' on' : '');
  document.getElementById('b-input').style.display = isBlocked ? 'block' : 'none';
}
async function progSubmit(isDone) {
  if (!selPct && !isDone) { alert('请先选择当前阶段'); return; }
  const t = tasks.find(x => x.id === progTaskId); if (!t) return;
  const upd = {
    user: cu,
    done: document.getElementById('p-done').value.trim(),
    next: document.getElementById('p-next').value.trim(),
    eta: document.getElementById('p-eta').value,
    pct: selPct || t.progress,
    blocked: isBlocked,
    blocker: isBlocked ? document.getElementById('p-block').value.trim() : ''
  };
  if (!t.updates) t.updates = [];
  t.updates.push(upd);
  t.progress = selPct || t.progress;
  if (isDone) { t.status = 'review'; t.progress = Math.max(t.progress, 90); }
  await saveTask(t);
  renderAll(); closeProg();
}

// ── 任务操作 ──
async function claim(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  if (t.is_global) {
    if (!(t.claims||[]).includes(cu)) t.claims.push(cu);
    if (!t.assignee) t.assignee = cu;
    t.status = 'doing';
  } else {
    t.assignee = cu; t.claims = [cu]; t.status = 'doing';
  }
  await saveTask(t); renderAll();
}
async function submitReview(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.status = 'review'; t.progress = Math.max(t.progress||0, 90);
  await saveTask(t); renderAll();
}
async function approve(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.status = 'done'; t.progress = 100;
  await saveTask(t); renderAll();
}
async function reject(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.status = 'doing';
  await saveTask(t); renderAll();
}

// ── 发布任务 ──
let isGlobalFlag = false;
function toggleGlobal() {
  isGlobalFlag = !isGlobalFlag;
  document.getElementById('g-tgl').className = 'tgl' + (isGlobalFlag ? ' on' : '');
  document.getElementById('t-assign').disabled = isGlobalFlag;
  if (isGlobalFlag) document.getElementById('t-assign').value = '';
}
async function publishTask() {
  if (cu !== '老符') return;
  const title = document.getElementById('t-title').value.trim();
  if (!title) { showToast('pub-toast', '请填写任务标题', 'err'); return; }
  const t = {
    id: 't' + Date.now(),
    title,
    description: document.getElementById('t-desc').value.trim() || '暂无描述',
    pri: document.getElementById('t-pri').value,
    due: document.getElementById('t-due').value,
    cat: document.getElementById('t-cat').value,
    status: 'todo',
    assignee: isGlobalFlag ? null : (document.getElementById('t-assign').value || null),
    is_global: isGlobalFlag,
    progress: 0, claims: [], updates: [],
    ts: Date.now()
  };
  tasks.push(t);
  await saveTask(t);
  ['t-title','t-desc','t-due'].forEach(id => document.getElementById(id).value = '');
  isGlobalFlag = false;
  document.getElementById('g-tgl').className = 'tgl';
  document.getElementById('t-assign').disabled = false;
  showToast('pub-toast', '任务已发布，全团队可见 ✓', 'ok');
  renderAll();
}
function showToast(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ── 用户菜单 ──
function buildUserMenu() {
  const m = document.getElementById('user-menu'); m.innerHTML = '';
  ALL.forEach(u => {
    const d = document.createElement('div');
    d.className = 'udopt' + (u === cu ? ' active' : '');
    d.innerHTML = `<div class="udopt-av" style="background:${avColor(u)}">${u[0]}</div>${u}${u==='老符'?'<span style="font-size:10px;opacity:.4;margin-left:auto">发布者</span>':''}`;
    d.onclick = () => { setUser(u); toggleUserMenu(); };
    m.appendChild(d);
  });
}
function toggleUserMenu() {
  buildUserMenu();
  document.getElementById('user-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#user-pill-wrap')) document.getElementById('user-menu').classList.remove('open');
});
function setUser(u) {
  cu = u;
  const isAdmin = u === '老符';
  document.getElementById('hd-av').textContent = u[0];
  document.getElementById('hd-av').style.background = avColor(u);
  document.getElementById('hd-name').textContent = u;
  document.getElementById('hd-role').textContent = isAdmin ? '发布者' : '成员';
  document.getElementById('hd-role').className = 'urole' + (isAdmin ? '' : ' member');
  document.getElementById('pub-lock').style.display = isAdmin ? 'none' : 'block';
  document.getElementById('pub-form').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('board-add').style.display = isAdmin ? '' : 'none';
  renderAll();
}

function switchTab(n) {
  ['board','publish','mine','overview'].forEach((s, i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', s===n);
    document.getElementById(s).classList.toggle('active', s===n);
  });
}

// 启动
init();
</script>
